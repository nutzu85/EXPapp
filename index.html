<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Cheltuieli RON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --surface2:#1e2530; --surface3:#252d3a;
      --border:#2a3441; --accent:#00d68f; --accent-dim:rgba(0,214,143,0.12);
      --text:#e8edf3; --text2:#8b96a5; --text3:#5a6474;
      --danger:#ff5c5c; --danger-dim:rgba(255,92,92,0.12);
      --card-color:#4f8ef7; --card-dim:rgba(79,142,247,0.12);
      --tichete:#f5a623; --tichete-dim:rgba(245,166,35,0.14);
      --radius:16px; --radius-sm:10px;
      --nav-h:72px; --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Lexend',sans-serif;font-size:15px;line-height:1.5}
    #root{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

    /* ── SCREENS ── */
    .screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .screen::-webkit-scrollbar{display:none}
    .screen.has-nav{padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}

    /* ── LOADER ── */
    #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999}
    .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loader p{font-size:13px;color:var(--text2)}

    /* ── SETUP SCREENS ── */
    .setup-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:0}
    .setup-logo{font-size:52px;margin-bottom:8px}
    .setup-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700;text-align:center;margin-bottom:6px}
    .setup-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px;line-height:1.6}
    .setup-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
    .setup-card h3{font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin-bottom:12px}
    .step-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--border)}
    .step-row:first-of-type{border-top:none}
    .step-num{width:24px;height:24px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(0,214,143,.3);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .step-text{font-size:13px;color:var(--text2);line-height:1.6}
    .step-text strong{color:var(--text);font-weight:600}
    .step-text code{background:var(--surface2);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--accent);font-family:monospace}
    .form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
    .form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;color:var(--text);font-family:'Lexend',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
    .form-input:focus{border-color:var(--accent)}
    .form-input.mono{font-family:monospace;font-size:12px;letter-spacing:.5px}
    .btn-primary{width:100%;padding:15px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#0d1117;font-family:'Lexend',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
    .btn-primary:active{transform:scale(.98);opacity:.9}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-secondary{width:100%;padding:13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Lexend',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
    .btn-secondary:active{background:var(--surface3)}
    .btn-danger{background:var(--danger-dim);border-color:rgba(255,92,92,.3);color:var(--danger)}
    .link-btn{background:none;border:none;color:var(--accent);font-family:'Lexend',sans-serif;font-size:13px;cursor:pointer;text-decoration:underline;padding:0}

    /* ── GOOGLE SIGN IN ── */
    .g-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:#fff;border:none;border-radius:var(--radius-sm);color:#1f1f1f;font-family:'Lexend',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
    .g-btn:active{transform:scale(.98);background:#f0f0f0}
    .g-btn svg{width:20px;height:20px;flex-shrink:0}

    /* ── SYNC BAR ── */
    #sync-bar{padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);background:var(--bg);min-height:36px}
    .sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .sync-dot.ok{background:var(--accent);animation:pulse 2.5s infinite}
    .sync-dot.syncing{background:var(--card-color);animation:spin .8s linear infinite;border-top-color:transparent}
    .sync-dot.error{background:var(--danger)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .sync-user{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
    .avatar{width:20px;height:20px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(0,214,143,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase}
    .sync-btn{padding:4px 10px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-family:'Lexend',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .sync-btn:active{background:var(--surface3);transform:scale(.95)}

    /* ── BOTTOM NAV ── */
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:'Lexend',sans-serif;transition:color .2s}
    .nav-item.active{color:var(--accent)}
    .nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .nav-item span{font-size:10px;font-weight:500}
    .nav-add{width:52px;height:52px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-20px;box-shadow:0 4px 20px rgba(0,214,143,.4);transition:transform .2s,box-shadow .2s}
    .nav-add:active{transform:scale(.92)}
    .nav-add svg{stroke:#0d1117;width:24px;height:24px;stroke-width:2.5}

    /* ── PAGE HEADER ── */
    .page-header{padding:16px 20px 10px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid transparent;transition:border-color .2s}
    .page-header.scrolled{border-color:var(--border)}
    .page-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;letter-spacing:-.5px}
    .page-subtitle{font-size:12px;color:var(--text2);margin-top:2px}

    /* ── MONTH PICKER ── */
    .month-picker{display:flex;align-items:center;gap:12px;padding:0 20px 14px}
    .month-btn{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .month-btn:active{transform:scale(.9)}
    .month-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .month-label{flex:1;text-align:center;font-size:15px;font-weight:600}

    /* ── BIG SUMMARY ── */
    .big-summary{margin:0 20px 12px;background:linear-gradient(135deg,#1a2535,#0f1a2a);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
    .big-summary::after{content:'lei';position:absolute;right:16px;bottom:8px;font-family:'Fraunces',serif;font-size:64px;font-weight:700;color:rgba(255,255,255,.03);line-height:1}
    .big-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2)}
    .big-value{font-family:'Fraunces',serif;font-size:40px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1.1;margin-top:4px}
    .big-value span{font-size:18px;color:var(--text2);font-weight:400}
    .progress-bar{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:12px}
    .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#00a8d6);transition:width .6s cubic-bezier(.4,0,.2,1)}
    .progress-fill.over{background:linear-gradient(90deg,#f5a623,var(--danger))}
    .progress-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--text2)}

    /* ── SUMMARY GRID ── */
    .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 20px 12px}
    .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;position:relative;overflow:hidden}
    .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .summary-card.cash::before{background:var(--accent)}
    .summary-card.card-type::before{background:var(--card-color)}
    .summary-card.tichete-type::before{background:var(--tichete)}
    .s-label{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;white-space:nowrap}
    .s-value{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px;line-height:1.1}
    .s-value .cur{font-size:10px;font-weight:400;color:var(--text2);margin-left:2px}
    .s-sub{font-size:10px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── SECTION ── */
    .section{padding:0 20px 16px}
    .section-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:10px}

    /* ── EXPENSE ITEMS ── */
    .expense-list{display:flex;flex-direction:column;gap:8px}
    .expense-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 13px 13px 15px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
    .expense-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
    .expense-item.cash-item::before{background:var(--accent)}
    .expense-item.card-item::before{background:var(--card-color)}
    .expense-item.tichete-item::before{background:var(--tichete)}
    .exp-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .exp-info{flex:1;min-width:0}
    .exp-desc{font-weight:500;color:var(--text);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .exp-meta{font-size:11px;color:var(--text2);margin-top:2px}
    .exp-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:99px;font-size:9px;font-weight:600;margin-right:4px}
    .badge-cash{background:var(--accent-dim);color:var(--accent)}
    .badge-card{background:var(--card-dim);color:var(--card-color)}
    .badge-tichete{background:var(--tichete-dim);color:var(--tichete)}
    .added-by{display:inline-flex;align-items:center;gap:4px;padding:1px 7px 1px 2px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);font-size:9px;font-weight:600;color:var(--text2);margin-left:4px}
    .added-by .ab-avatar{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;text-transform:uppercase;flex-shrink:0}
    .ab-me{background:var(--accent)}
    .ab-other{background:var(--card-color)}
    .exp-amount{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--danger);white-space:nowrap}
    .exp-actions{display:flex;gap:5px}
    .icon-btn{width:30px;height:30px;border-radius:8px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .icon-btn:active{transform:scale(.88)}
    .icon-btn.del:active{background:var(--danger-dim);color:var(--danger)}
    .icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .empty-state{text-align:center;padding:36px 20px;color:var(--text2)}
    .empty-state .emoji{font-size:44px;margin-bottom:10px}
    .empty-state p{font-size:13px}

    /* ── ADD FORM ── */
    .form-view{padding:0 20px}
    .form-group{margin-bottom:16px}
    .form-label-sm{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin-bottom:7px}
    .form-inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;color:var(--text);font-family:'Lexend',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
    .form-inp:focus{border-color:var(--accent)}
    .amount-inp{font-family:'Fraunces',serif;font-size:30px;font-weight:700;text-align:center;letter-spacing:-.5px}
    .amount-wrap{position:relative}
    .amount-cur{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text2);pointer-events:none}
    .toggle-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .tog-btn{padding:11px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Lexend',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2}
    .tog-btn .tog-emoji{font-size:18px}
    .tog-btn.cash-on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .tog-btn.card-on{background:var(--card-dim);border-color:var(--card-color);color:var(--card-color)}
    .tog-btn.tichete-on{background:var(--tichete-dim);border-color:var(--tichete);color:var(--tichete)}

    /* ── ACCOUNT PICKER ── */
    .acc-picker{display:flex;gap:7px;overflow-x:auto;padding:3px 0 5px;-webkit-overflow-scrolling:touch}
    .acc-picker::-webkit-scrollbar{display:none}
    .acc-pill{flex-shrink:0;min-width:88px;padding:11px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Lexend',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2;text-align:center}
    .acc-pill .ap-emoji{font-size:18px}
    .acc-pill .ap-name{white-space:nowrap;font-size:12px}
    .acc-pill .ap-owner{font-size:9px;color:var(--text3);font-weight:600;margin-top:1px;letter-spacing:.2px}
    .acc-pill.sel-cash{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .acc-pill.sel-cash .ap-owner{color:var(--accent)}
    .acc-pill.sel-card{background:var(--card-dim);border-color:var(--card-color);color:var(--card-color)}
    .acc-pill.sel-card .ap-owner{color:var(--card-color)}
    .acc-pill.sel-tichete{background:var(--tichete-dim);border-color:var(--tichete);color:var(--tichete)}
    .acc-pill.sel-tichete .ap-owner{color:var(--tichete)}

    /* ── ACCOUNT CARDS ROW (home) ── */
    .acc-cards-row{display:flex;gap:10px;overflow-x:auto;padding:0 20px 12px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
    .acc-cards-row::-webkit-scrollbar{display:none}
    .acc-card{flex-shrink:0;width:148px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;position:relative;overflow:hidden;scroll-snap-align:start}
    .acc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .acc-card.t-cash::before{background:var(--accent)}
    .acc-card.t-card::before{background:var(--card-color)}
    .acc-card.t-tichete::before{background:var(--tichete)}
    .ac-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
    .ac-emoji{font-size:18px}
    .ac-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .ac-owner-tag{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ac-spent{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px;line-height:1.1}
    .ac-spent .cur{font-size:11px;font-weight:400;color:var(--text2);margin-left:2px}
    .ac-rem{font-size:10px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ac-rem.over{color:var(--danger)}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
    .cat-btn{padding:9px 5px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Lexend',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
    .cat-btn .ce{font-size:19px}
    .cat-btn.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

    /* ── BUDGET ── */
    .budget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
    .bud-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .bud-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px}
    .bud-icon.cash-icon{background:var(--accent-dim)}
    .bud-icon.card-icon{background:var(--card-dim)}
    .bud-icon.tichete-icon{background:var(--tichete-dim)}
    .bud-title{font-size:15px;font-weight:600}
    .bud-desc{font-size:11px;color:var(--text2)}
    .bud-row{display:flex;gap:8px;align-items:center}
    .bud-inp-wrap{flex:1;position:relative}
    .bud-inp-wrap input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 44px 11px 12px;color:var(--text);font-family:'Fraunces',serif;font-size:19px;font-weight:700;outline:none;transition:border-color .2s;-webkit-appearance:none}
    .bud-inp-wrap input:focus{border-color:var(--accent)}
    .bud-inp-wrap .sfx{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text2);pointer-events:none}
    .save-btn{padding:11px 16px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#0d1117;font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
    .save-btn:active{transform:scale(.95)}
    .stat-row{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--border)}
    .stat-label{font-size:12px;color:var(--text2)}
    .stat-value{font-size:12px;font-weight:600}
    .green{color:var(--accent)}
    .red{color:var(--danger)}

    /* ── ACCOUNT ITEM (settings) ── */
    .acc-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;position:relative;overflow:hidden}
    .acc-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}

    .header-action:active{transform:scale(.9);background:var(--surface3)}

  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p id="loader-msg">Se încarcă…</p></div>
<div id="root" style="display:none"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ════════════════════════════════════════════════════════════════
const LS = {
  clientId:  'cheltuieli_clientId',
  fileId:    'cheltuieli_fileId',
  userEmail: 'cheltuieli_email',
  userName:  'cheltuieli_name',
};
const DRIVE_FILE_NAME = 'cheltuieli-ron-database.json';
const DRIVE_API       = 'https://www.googleapis.com/drive/v3';
const DRIVE_UPLOAD    = 'https://www.googleapis.com/upload/drive/v3';
const SCOPE           = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';

const DEFAULT_CATEGORIES = [
  {id:'c1',name:'Mâncare',emoji:'🍔'},{id:'c2',name:'Transport',emoji:'🚗'},
  {id:'c3',name:'Utilități',emoji:'💡'},{id:'c4',name:'Divertisment',emoji:'🎬'},
  {id:'c5',name:'Sănătate',emoji:'💊'},{id:'c6',name:'Îmbrăcăminte',emoji:'👕'},
  {id:'c7',name:'Educație',emoji:'📚'},{id:'c8',name:'Casă',emoji:'🏠'},
  {id:'c9',name:'Altele',emoji:'📦'},
];

const DEFAULT_ACCOUNTS = [
  { id:'acc-cash',    name:'Cash',         type:'cash',    emoji:'💵', owner:'' },
  { id:'acc-card',    name:'Card',         type:'card',    emoji:'💳', owner:'' },
  { id:'acc-tichete', name:'Tichete Masă', type:'tichete', emoji:'🎟️', owner:'' },
];

// ════════════════════════════════════════════════════════════════
//  AUTH STATE
// ════════════════════════════════════════════════════════════════
let tokenClient  = null;
let accessToken  = null;
let tokenExpiry  = 0;
let userEmail    = localStorage.getItem(LS.userEmail) || '';
let userName     = localStorage.getItem(LS.userName)  || '';
let clientId     = localStorage.getItem(LS.clientId)  || '';
let fileId       = localStorage.getItem(LS.fileId)    || '';

function isTokenValid() { return accessToken && Date.now() < tokenExpiry - 60_000; }

function initTokenClient() {
  if (!clientId || !window.google) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: SCOPE,
    callback: handleTokenResponse,
  });
}

function handleTokenResponse(resp) {
  if (resp.error) { showToast('Autentificare eșuată: ' + resp.error, 'err'); return; }
  accessToken = resp.access_token;
  tokenExpiry = Date.now() + (resp.expires_in * 1000);
  afterSignIn();
}

async function requestToken(silent = false) {
  return new Promise((resolve, reject) => {
    if (!tokenClient) { reject('No token client'); return; }
    tokenClient.callback = (resp) => {
      if (resp.error) { reject(resp.error); return; }
      accessToken = resp.access_token;
      tokenExpiry = Date.now() + (resp.expires_in * 1000);
      resolve();
    };
    tokenClient.requestAccessToken({ prompt: silent ? '' : 'select_account' });
  });
}

async function ensureToken() {
  if (isTokenValid()) return;
  await requestToken(true);
}

// ════════════════════════════════════════════════════════════════
//  GOOGLE DRIVE API
// ════════════════════════════════════════════════════════════════
async function driveRequest(url, options = {}) {
  await ensureToken();
  const resp = await fetch(url, {
    ...options,
    headers: { 'Authorization': `Bearer ${accessToken}`, ...(options.headers || {}) },
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  return resp;
}

async function driveGetUserInfo() {
  const resp = await driveRequest('https://www.googleapis.com/oauth2/v2/userinfo');
  return resp.json();
}

async function driveFindFile(name) {
  const q = encodeURIComponent(`name='${name}' and trashed=false`);
  const resp = await driveRequest(`${DRIVE_API}/files?q=${q}&fields=files(id,name,modifiedTime)&includeItemsFromAllDrives=true&supportsAllDrives=true`);
  const data = await resp.json();
  return data.files?.[0] || null;
}

async function driveGetFile(id) {
  const resp = await driveRequest(`${DRIVE_API}/files/${id}?alt=media&supportsAllDrives=true`);
  return resp.json();
}

async function driveGetMeta(id) {
  const resp = await driveRequest(`${DRIVE_API}/files/${id}?fields=id,name,modifiedTime,owners,shared&supportsAllDrives=true`);
  return resp.json();
}

async function driveCreateFile(name, content) {
  // Step 1: create file metadata
  const metaResp = await driveRequest(`${DRIVE_API}/files`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/json' }),
  });
  const meta = await metaResp.json();
  // Step 2: upload content
  await driveUpdateFile(meta.id, content);
  return meta.id;
}

async function driveUpdateFile(id, content) {
  await driveRequest(`${DRIVE_UPLOAD}/files/${id}?uploadType=media&supportsAllDrives=true`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(content),
  });
}

// ════════════════════════════════════════════════════════════════
//  APP DATA  (in-memory, synced with Drive)
// ════════════════════════════════════════════════════════════════
let appData = null;   // full DB loaded from Drive
let syncStatus  = 'idle';   // 'idle' | 'syncing' | 'ok' | 'error'
let lastSyncAt  = null;
let lastSyncBy  = '';
let conflictData = null;    // remote data when conflict detected
let saveTimer   = null;

function emptyDB() {
  return {
    version: 3,
    lastModified: new Date().toISOString(),
    lastModifiedBy: userEmail,
    expenses: [],
    categories: [...DEFAULT_CATEGORIES],
    accounts: [...DEFAULT_ACCOUNTS],
    budgets: {},   // shape: { 'YYYY-MM': { [accountId]: amount } }
  };
}

/* Migrate old DB shape (v1/v2) to v3 (accounts model) */
function migrateDB(data) {
  if (!data) return data;
  // Add accounts if missing
  if (!data.accounts || !Array.isArray(data.accounts) || data.accounts.length === 0) {
    data.accounts = [...DEFAULT_ACCOUNTS];
  }
  // Ensure each expense has accountId derived from old `method`
  if (data.expenses) {
    data.expenses.forEach(e => {
      if (!e.accountId) {
        e.accountId = 'acc-' + (e.method || 'cash');
      }
    });
  }
  // Migrate budgets: { cash, card, tichete } → { [accId]: amount }
  if (data.budgets) {
    Object.entries(data.budgets).forEach(([month, b]) => {
      if (b && (b.cash !== undefined || b.card !== undefined || b.tichete !== undefined)) {
        const newB = {};
        if (b.cash    !== undefined) newB['acc-cash']    = b.cash;
        if (b.card    !== undefined) newB['acc-card']    = b.card;
        if (b.tichete !== undefined) newB['acc-tichete'] = b.tichete;
        // Preserve any per-account keys that already exist
        Object.keys(b).forEach(k => { if (!['cash','card','tichete'].includes(k)) newB[k] = b[k]; });
        data.budgets[month] = newB;
      }
    });
  }
  data.version = 3;
  return data;
}

async function loadFromDrive() {
  setSyncStatus('syncing');
  try {
    const data = await driveGetFile(fileId);
    if (!data.expenses) throw new Error('Format invalid');
    appData = migrateDB(data);
    lastSyncAt  = new Date();
    lastSyncBy  = data.lastModifiedBy || '';
    setSyncStatus('ok');
    return data;
  } catch(err) {
    setSyncStatus('error');
    throw err;
  }
}

async function saveToDrive(skipConflictCheck = false) {
  if (!fileId || !appData) return;
  setSyncStatus('syncing');
  try {
    // Conflict check: compare remote lastModified vs what we loaded
    if (!skipConflictCheck && lastSyncAt) {
      const meta = await driveGetMeta(fileId);
      const remoteTime = new Date(meta.modifiedTime).getTime();
      const localTime  = new Date(appData.lastModified).getTime();
      if (remoteTime > localTime + 2000) {
        // Someone else saved after us — fetch their version
        const remoteData = await driveGetFile(fileId);
        if (remoteData.lastModifiedBy !== userEmail) {
          conflictData = remoteData;
          setSyncStatus('error');
          renderSyncBar();
          showConflictBanner();
          return;
        }
      }
    }
    appData.lastModified   = new Date().toISOString();
    appData.lastModifiedBy = userEmail;
    await driveUpdateFile(fileId, appData);
    lastSyncAt = new Date();
    lastSyncBy = userEmail;
    setSyncStatus('ok');
    renderSyncBar();
  } catch(err) {
    setSyncStatus('error');
    renderSyncBar();
    showToast('Eroare sincronizare: ' + err.message, 'err');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToDrive(), 1500);
}

function setSyncStatus(s) {
  syncStatus = s;
  renderSyncBar();
}

// ════════════════════════════════════════════════════════════════
//  APP STATE
// ════════════════════════════════════════════════════════════════
let currentView   = 'home';
let selectedMonth = todayMonth();
let expFilter     = 'all';
let editingId     = null;
let addForm = { amount:'', description:'', categoryId:'', accountId:'', date: todayStr() };
let deferredInstall = null;

function todayStr()   { return new Date().toISOString().split('T')[0]; }
function todayMonth() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function genId()      { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function monthKey(s)  { return s ? s.slice(0,7) : ''; }

function formatMonth(ym) {
  const [y,m] = ym.split('-');
  return ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'][+m-1]+' '+y;
}
function shiftMonth(ym,dir) {
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function formatRon(n) { return new Intl.NumberFormat('ro-RO',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0); }
function formatDate(s) { if(!s) return ''; return new Date(s+'T00:00:00').toLocaleDateString('ro-RO',{day:'numeric',month:'short'}); }
function formatTime(d) { if(!d) return ''; return new Date(d).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}); }
function getCat(id)   { return appData?.categories?.find(c=>c.id===id)||{name:'Altele',emoji:'📦'}; }
function getAccount(id) {
  return appData?.accounts?.find(a=>a.id===id) || { id, name:'?', type:'cash', emoji:'💵', owner:'' };
}
function ownerName(email) { return email ? email.split('@')[0] : ''; }
function monthExps()  { return (appData?.expenses||[]).filter(e=>monthKey(e.date)===selectedMonth); }

// ════════════════════════════════════════════════════════════════
//  BOOT FLOW
// ════════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  // Wait for GIS to load
  const check = setInterval(() => {
    if (window.google?.accounts?.oauth2) {
      clearInterval(check);
      boot();
    }
  }, 100);
  setTimeout(() => { clearInterval(check); boot(); }, 5000); // fallback
});

async function boot() {
  if (!clientId)  { showSetupClientId(); return; }
  initTokenClient();
  if (!accessToken) { showSetupSignIn(); return; }
  if (!fileId)    { showSetupDatabase(); return; }
  await startApp();
}

// ════════════════════════════════════════════════════════════════
//  SETUP SCREENS
// ════════════════════════════════════════════════════════════════

  document.getElementById('loader').style.display = 'flex';
  document.getElementById('loader-msg').textContent = msg || 'Se încarcă…';
  document.getElementById('root').style.display = 'none';
}
function hideLoader() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('root').style.display   = 'flex';
}

function showSetupClientId() {
  hideLoader();
  document.getElementById('root').innerHTML = `
    <div class="screen" style="background:var(--bg)">
      <div class="setup-wrap">
        <div class="setup-logo">💳</div>
        <div class="setup-title">Cheltuieli RON</div>
        <div class="setup-sub">Tracker de cheltuieli cu sincronizare Google Drive pentru 2 utilizatori</div>

        <div class="setup-card">
          <h3>⚙️ Configurare Google Cloud (o singură dată)</h3>
          <div class="step-row"><div class="step-num">1</div><div class="step-text">Mergi la <strong>console.cloud.google.com</strong> și creează un proiect nou (sau selectează unul existent)</div></div>

          <div class="step-row"><div class="step-num">5</div><div class="step-text">Mergi la <em>OAuth consent screen → Test users</em> și adaugă ambele adrese Gmail ale utilizatorilor</div></div>
          <div class="step-row"><div class="step-num">6</div><div class="step-text">Copiază <strong>Client ID</strong>-ul generat și lipește-l mai jos</div></div>
        </div>

        <div class="setup-card">
          <h3>🔑 Introdu Client ID</h3>
          <label class="form-label">Google OAuth Client ID</label>
          <input type="text" class="form-input mono" id="inp-clientid" placeholder="xxxx.apps.googleusercontent.com" style="margin-bottom:12px">
          <button class="btn-primary" onclick="saveClientId()">Continuă →</button>
        </div>

async function signIn() {

async function afterSignIn() {
  setLoader('Se verifică contul…');
  try {
    let email = '';
    let name  = '';

    // Try userinfo API first
    try {
      const info = await driveGetUserInfo();
      email = info.email || '';
      name  = info.name  || '';
    } catch(e) {
      console.warn('userinfo failed, trying tokeninfo fallback:', e);
    }

    // Fallback: use Drive's "about me" endpoint which always works with drive scope
    if (!email) {
      try {
        const resp = await driveRequest(`${DRIVE_API}/about?fields=user`);
        const data = await resp.json();
        email = data.user?.emailAddress || '';
        name  = data.user?.displayName  || '';
      } catch(e) {
        console.warn('drive about failed:', e);
      }
    }

    // Final fallback: ask the user
    if (!email) {
      email = prompt('Nu am putut obține adresa de email automat. Introdu-o manual:') || 'user@unknown';
      name  = email.split('@')[0];
    }

    userEmail = email;
    userName  = name;
    localStorage.setItem(LS.userEmail, userEmail);
    localStorage.setItem(LS.userName,  userName);
    if (!fileId) { showSetupDatabase(); }
    else          { await startApp(); }
  } catch(err) {
    hideLoader();
    showSetupSignIn();
    showToast('Eroare autentificare: ' + err.message, 'err');
  }
}

function showConflictBanner() {
  if (!conflictData) return;
  const c = document.getElementById('view-content');
  const existing = c.querySelector('.conflict-banner');
  if (existing) { existing.scrollIntoView({behavior:'smooth'}); return; }
  const banner = document.createElement('div');
  banner.className = 'conflict-banner';
  banner.innerHTML = `
    <h4>⚡ Conflict de sincronizare</h4>
    <p>Datele au fost modificate de <strong>${conflictData.lastModifiedBy||'alt utilizator'}</strong>. Ce vrei să faci?</p>
    <div class="conflict-actions">
      <button class="conflict-btn keep" onclick="resolveConflict('keep')">Păstrează ale mele</button>
      <button class="conflict-btn pull" onclick="resolveConflict('pull')">Preia modificările lor</button>
    </div>`;
  c.insertBefore(banner, c.firstChild);
}

async function resolveConflict(choice) {
  if (choice === 'pull') {
    appData = conflictData;
    lastSyncAt = new Date();
    lastSyncBy = conflictData.lastModifiedBy;
  } else {
    await saveToDrive(true); // force save ours
  }
  conflictData = null;
  setSyncStatus('ok');
  renderView();
  showToast(choice==='pull'?'Date preluate ✓':'Datele tale au fost salvate ✓','ok');
}

  const map = { home:renderHome, expenses:renderExpenses, add:()=>renderAdd(null), budget:renderBudget, settings:renderSettings, help:renderHelp };

}

  if (e.target.id!=='view-content') return;
  const h = e.target.querySelector('.page-header');
  if (h) h.classList.toggle('scrolled', e.target.scrollTop > 6);
}

      ${totalBudget > 0 ? `
      <div class="progress-bar"><div class="progress-fill ${pct>90?'over':''}" style="width:${pct}%"></div></div>

function renderExpenses() {
  const c = document.getElementById('view-content');
  const exps = monthExps();
  let filtered = exps;
  if (expFilter !== 'all') {
    filtered = exps.filter(e => e.accountId === expFilter);
  }
  const sorted = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));

  let html = `
    <div class="page-header"><div class="page-title">Cheltuieli</div><div class="page-subtitle">${formatMonth(selectedMonth)}</div></div>

      <button class="month-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></button>

      <div class="chip ${expFilter==='all'?'active':''}" onclick="setFilter('all')">Toate (${exps.length})</div>`;
  (appData.accounts||[]).forEach(acc => {
    const n = exps.filter(e=>e.accountId===acc.id).length;
    const ownerLbl = acc.owner ? ` · ${ownerName(acc.owner)}` : '';
    html += `<div class="chip ${expFilter===acc.id?'active':''}" onclick="setFilter('${acc.id}')">${acc.emoji} ${acc.name}${ownerLbl} (${n})</div>`;
  });
  html += `</div><div class="section">`;

  if (!sorted.length) {
    html += `<div class="empty-state"><div class="emoji">📭</div><p>Nicio cheltuială pentru filtrul selectat.</p></div>`;
  } else {
    const groups = {};
    sorted.forEach(e=>{ if(!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });
    html += `<div class="expense-list">`;
    Object.entries(groups).forEach(([date,items])=>{
      const dt = items.reduce((s,e)=>s+e.amount,0);
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0 3px;border-top:1px solid var(--border);margin-top:4px">

        <span style="font-size:11px;color:var(--text3)">${formatRon(dt)} lei</span>

  c.innerHTML = html;
}

function selectCat(id,el) {
  addForm.categoryId=id;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

function selectAccount(id, type, el) {
  addForm.accountId = id;
  document.querySelectorAll('.acc-pill').forEach(b=>{
    b.classList.remove('sel-cash','sel-card','sel-tichete');
  });
  el.classList.add('sel-'+type);
}

async function saveExpense() {
  const amount = parseFloat(addForm.amount);
  if (!amount||amount<=0) { showToast('Introdu o sumă validă!','err'); return; }
  if (!addForm.description.trim()) { showToast('Adaugă o descriere!','err'); return; }
  if (!addForm.date) { showToast('Selectează o dată!','err'); return; }
  if (!addForm.accountId) { showToast('Alege un cont!','err'); return; }
  if (!addForm.categoryId) addForm.categoryId = appData.categories[0]?.id||'c9';

  const acc = getAccount(addForm.accountId);
  const rec = {
    id: editingId||genId(),
    amount,
    description: addForm.description.trim(),
    categoryId:  addForm.categoryId,
    accountId:   addForm.accountId,
    method:      acc.type,           // keep for backward compat
    date:        addForm.date,
    addedBy:     userEmail,
    updatedAt:   new Date().toISOString(),
  };

  if (editingId) {
    const idx = appData.expenses.findIndex(e=>e.id===editingId);
    if (idx!==-1) appData.expenses[idx] = {...appData.expenses[idx], ...rec};
    showToast('Cheltuială actualizată ✓','ok');
  } else {
    rec.createdAt = new Date().toISOString();
    appData.expenses.push(rec);
    showToast('Cheltuială adăugată ✓','ok');
  }

  selectedMonth = monthKey(addForm.date);
  scheduleSave();
  navigate('home');
}

// ════════════════════════════════════════════════════════════════
//  BUDGET
// ════════════════════════════════════════════════════════════════
function renderBudget() {
  const c = document.getElementById('view-content');
  const monthBudget = appData.budgets?.[selectedMonth] || {};
  const exps = monthExps();
  const accounts = appData.accounts || [];

  const spentFor = id => exps.filter(e=>e.accountId===id).reduce((s,e)=>s+e.amount,0);
  const totalBudget = accounts.reduce((s,a)=>s+(Number(monthBudget[a.id])||0), 0);
  const totalSpent  = exps.reduce((s,e)=>s+e.amount,0);

  let html = `
    <div class="page-header"><div class="page-title">Buget</div><div class="page-subtitle">${formatMonth(selectedMonth)}</div></div>
    <div class="month-picker">
      <button class="month-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></button>
      <div class="month-label">${formatMonth(selectedMonth)}</div>
      <button class="month-btn" onclick="changeMonth(1)"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></button>
    </div>
    <div class="section">`;

  if (accounts.length === 0) {
    html += `<div class="empty-state"><div class="emoji">🏦</div><p>Nu ai conturi.<br>Adaugă din <strong>Setări</strong>.</p></div>`;
  } else {
    accounts.forEach(acc => {
      const spent  = spentFor(acc.id);
      const bud    = Number(monthBudget[acc.id]) || 0;
      const rem    = bud - spent;
      const iconCls= acc.type === 'cash' ? 'cash-icon' : acc.type === 'card' ? 'card-icon' : 'tichete-icon';
      html += `
        <div class="budget-card">
          <div class="bud-hdr">
            <div class="bud-icon ${iconCls}">${acc.emoji}</div>
            <div style="flex:1;min-width:0">
              <div class="bud-title">${acc.name}</div>
              <div class="bud-desc">${acc.owner ? `👤 ${ownerName(acc.owner)} · ` : 'Cont comun · '}${acc.type === 'cash' ? 'cash' : acc.type === 'card' ? 'card' : 'tichete masă'}</div>
            </div>
          </div>
          <div class="bud-row">
            <div class="bud-inp-wrap"><input type="number" id="bud-${acc.id}" value="${bud||''}" placeholder="0" inputmode="decimal" step="0.01"><span class="sfx">lei</span></div>
            <button class="save-btn" onclick="saveBudget('${acc.id}')">Salvează</button>
          </div>
          <div class="stat-row"><span class="stat-label">Cheltuit</span><span class="stat-value red">${formatRon(spent)} lei</span></div>
          <div class="stat-row"><span class="stat-label">Rămas</span><span class="stat-value ${rem>=0?'green':'red'}">${formatRon(rem)} lei</span></div>
        </div>`;
    });

    html += `
      <div class="budget-card" style="background:linear-gradient(135deg,#1a2535,#0f1a2a)">
        <div class="section-title" style="margin-bottom:10px">📊 Rezumat total</div>
        <div class="stat-row" style="border-top:none"><span class="stat-label">Buget total</span><span class="stat-value">${formatRon(totalBudget)} lei</span></div>
        <div class="stat-row"><span class="stat-label">Total cheltuit</span><span class="stat-value red">${formatRon(totalSpent)} lei</span></div>
        <div class="stat-row"><span class="stat-label">Total rămas</span><span class="stat-value ${(totalBudget-totalSpent)>=0?'green':'red'}">${formatRon(totalBudget-totalSpent)} lei</span></div>
      </div>`;
  }

  html += `</div>`;
  c.innerHTML = html;
}

function saveBudget(accountId) {
  const val = parseFloat(document.getElementById(`bud-${accountId}`).value)||0;
  if (!appData.budgets) appData.budgets = {};
  if (!appData.budgets[selectedMonth]) appData.budgets[selectedMonth] = {};
  appData.budgets[selectedMonth][accountId] = val;
  scheduleSave();
  const acc = getAccount(accountId);
  showToast(`Buget "${acc.name}" salvat ✓`,'ok');
  renderBudget();
}

      </div>

      <div class="help-section" id="h-cats">
        <h3>🏷️ Categorii</h3>
        <p>Categoriile clasifică <strong>pentru ce</strong> ai plătit (Mâncare, Transport, Utilități...). Vin 9 categorii implicite, dar le poți edita/șterge/adăuga.</p>
        <ul>
          <li>Mergi la <strong>Setări → 🏷️ Categorii</strong></li>
          <li>Adaugă o categorie nouă: scrie un emoji + nume → <strong>+ Adaugă</strong></li>
          <li>Editează (📝) sau șterge (🗑️) orice categorie</li>
        </ul>
        <p>Numărul afișat lângă o categorie arată câte cheltuieli o folosesc.</p>
      </div>

      <div class="help-section" id="h-sync">
        <h3>🔄 Sincronizare cu Google Drive</h3>
        <p>Toate datele sunt salvate într-un fișier JSON din Google Drive-ul utilizatorului care a creat baza de date. Sincronizarea este <strong>automată</strong>:</p>
        <ul>
          <li>După fiecare modificare → salvare automată în ~1.5 secunde</li>
          <li>Când deschizi aplicația → încarcă ultima versiune din Drive</li>
          <li>Bara de sus arată statusul: 🟢 Sincronizat, 🔄 Se sincronizează, 🔴 Eroare</li>
          <li>Apasă <strong>↻ Sync</strong> pentru a forța preluarea celor mai noi date</li>
        </ul>
        <p><strong>Conflict de sincronizare:</strong> dacă ambii utilizatori modifică în același timp, apare un avertisment. Alegi:</p>
        <ul>
          <li><strong>Păstrează ale mele</strong> — modificările tale rămân, ale celuilalt se pierd</li>
          <li><strong>Preia modificările lor</strong> — tu pierzi modificările făcute, dar ai versiunea lui</li>
        </ul>
        <div class="help-tip"><strong>💡 Sugestie:</strong> Apasă "Sync" înainte să modifici dacă știi că celălalt a folosit recent aplicația — eviți conflictele.</div>
      </div>

      <div class="help-section" id="h-share">
        <h3>👥 Doi utilizatori — partajare</h3>
        <p>Aplicația suportă exact <strong>2 utilizatori</strong> care văd aceleași date.</p>
        <p><strong>Primul utilizator (proprietarul):</strong></p>
        <ul>
          <li>Creează baza de date la prima conectare</li>
          <li>Mergi la <strong>drive.google.com</strong>, găsește fișierul <code>cheltuieli-ron-database.json</code></li>
          <li>Click dreapta → <strong>Share</strong> → adaugă adresa Gmail a celuilalt cu permisiune <strong>Editor</strong></li>
          <li>În aplicație: <em>Setări → 📤 Arată File ID</em> → copiază și trimite-l celuilalt</li>
        </ul>
        <p><strong>Al doilea utilizator:</strong></p>
        <ul>
          <li>Deschide aceeași aplicație (același link)</li>
          <li>Pune același Client ID Google</li>
          <li>Conectează-te cu Google</li>
          <li>Alege <strong>"Conectează-te la una existentă"</strong> și pune File ID-ul primit</li>
        </ul>
        <p>Pe fiecare cheltuială vezi cine a adăugat-o (avatarul colorat: 🟢 verde = tu, 🔵 albastru = celălalt).</p>
        <div class="help-warn"><strong>⚠️ Important:</strong> Ambele adrese Gmail trebuie să fie adăugate în <em>Test Users</em> în Google Cloud Console (vezi pașii din pagina de Setup la prima utilizare).</div>
      </div>

      <div class="help-section" id="h-install">
        <h3>📲 Instalare pe telefon (PWA)</h3>
        <p>Aplicația poate fi instalată ca o aplicație nativă pe Android:</p>
        <ul>
          <li>Deschide aplicația în <strong>Chrome</strong> pe telefon</li>
          <li>Apasă meniul <strong>⋮</strong> din colțul dreapta-sus</li>
          <li>Selectează <strong>"Add to Home Screen"</strong> / "Adaugă pe ecranul principal"</li>
          <li>Confirmă numele și apasă <strong>Add</strong></li>
        </ul>
        <p>Aplicația apare ca o iconiță pe ecranul principal și se deschide fullscreen, fără bara de URL.</p>
        <p>Pe iPhone (Safari): <em>Share → Add to Home Screen</em>.</p>
      </div>

      <div class="help-section" id="h-trouble">
        <h3>🛠️ Probleme frecvente</h3>
        <p><strong>"Access blocked: this app is not verified"</strong></p>
        <p>Adresa Gmail nu e adăugată ca <em>Test User</em> în Google Cloud Console. Mergi la <em>OAuth consent screen → Test users → Add user</em>.</p>

        <p><strong>"Eroare sincronizare"</strong></p>
        <p>Token-ul de autentificare a expirat (durează 1 oră). Apasă <strong>↻ Sync</strong> și aprobă conexiunea din nou.</p>

        <p><strong>"Nu s-a găsit fișierul"</strong></p>
        <ul>
          <li>Verifică că File ID-ul e corect (fără spații)</li>
          <li>Verifică că proprietarul a partajat fișierul cu Editor access</li>
          <li>Verifică că folosești adresa Gmail corectă</li>
        </ul>

        <p><strong>"Conflict detectat"</strong></p>
        <p>Înseamnă că celălalt utilizator a modificat ceva după ultima ta sincronizare. Alege ce versiune să păstrezi.</p>

        <p><strong>Datele nu se sincronizează</strong></p>
        <ul>
          <li>Verifică conexiunea la internet</li>
          <li>Apasă <strong>↻ Sync</strong> manual</li>
          <li>Reîncarcă pagina (F5 sau pull-to-refresh)</li>
          <li>Deconectare → re-autentificare</li>
        </ul>
      </div>

      <div class="help-section" id="h-privacy">
        <h3>🔒 Confidențialitate și securitate</h3>
        <p>Datele tale sunt <strong>complet private</strong>:</p>
        <ul>
          <li>Fișierul cu cheltuieli e stocat în <strong>Google Drive-ul tău personal</strong> — nimeni altcineva nu îl poate accesa fără permisiunea ta</li>
          <li>Doar utilizatorii pe care îi adaugi în <em>Test Users</em> pot folosi aplicația</li>
          <li>Doar persoanele cu care partajezi fișierul Drive pot vedea datele</li>
          <li>Aplicația nu trimite date către nimeni altcineva — totul rămâne între tine, Google și partenerul tău</li>
        </ul>
        <p><strong>Pentru a șterge totul:</strong></p>
        <ul>
          <li>Mergi pe <strong>drive.google.com</strong> și șterge fișierul <code>cheltuieli-ron-database.json</code></li>
          <li>Sau revocă permisiunile aplicației din <a style="color:var(--accent)" href="https://myaccount.google.com/permissions" target="_blank">myaccount.google.com/permissions</a></li>
        </ul>
        <div class="help-tip"><strong>💡 Sfat:</strong> Faci backup ușor — descarcă fișierul JSON din Google Drive oricând. E un fișier text, citibil de orice editor.</div>
      </div>

      <div style="text-align:center;margin-top:24px;padding:20px;color:var(--text3);font-size:11px">
        <div style="font-size:24px;margin-bottom:8px">💳</div>
        Cheltuieli RON · Versiunea 3<br>
        Pentru întrebări sau sugestii, scrie autorului aplicației.
      </div>

    </div>`;
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}
function showAddAccountModal(editingAcc) {
  const isEdit = !!editingAcc;
  const acc = editingAcc || { name:'', type:'cash', emoji:'💵', owner:'' };
  const emails = [...new Set([userEmail, ...(appData.expenses.map(e=>e.addedBy).filter(Boolean))])];
  const ownerOpts = emails.map(e => `<option value="${e}" ${acc.owner===e?'selected':''}>👤 ${ownerName(e)} (${e})</option>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${isEdit?'Editează cont':'Cont nou'}</div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label-sm">Nume cont</label>
      <input type="text" class="form-inp" id="new-acc-name" placeholder="Ex: Cash Andrei, Card BCR..." value="${acc.name}">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label-sm">Tip</label>
      <div class="toggle-group">
        <button class="tog-btn ${acc.type==='cash'?'cash-on':''}" id="acc-type-cash" onclick="setAccType('cash')"><span class="tog-emoji">💵</span><span>Cash</span></button>
        <button class="tog-btn ${acc.type==='card'?'card-on':''}" id="acc-type-card" onclick="setAccType('card')"><span class="tog-emoji">💳</span><span>Card</span></button>
        <button class="tog-btn ${acc.type==='tichete'?'tichete-on':''}" id="acc-type-tichete" onclick="setAccType('tichete')"><span class="tog-emoji">🎟️</span><span>Tichete</span></button>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label-sm">Emoji (opțional)</label>
      <input type="text" class="form-inp" id="new-acc-emoji" maxlength="2" value="${acc.emoji}" style="text-align:center;font-size:24px">
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label class="form-label-sm">Proprietar (opțional)</label>
      <select class="form-inp" id="new-acc-owner">
        <option value="" ${!acc.owner?'selected':''}>Cont comun (fără proprietar)</option>
        ${ownerOpts}
      </select>
    </div>
    ${isEdit ? `<button class="btn-primary" onclick="saveEditAcc('${acc.id}')">Salvează</button>` : `<button class="btn-primary" onclick="saveNewAcc()">+ Adaugă cont</button>`}`;
  pendingAccType = acc.type;
  pendingAccEmoji = acc.emoji;
  openModal();
}

let pendingAccType = 'cash';
let pendingAccEmoji = '💵';

function setAccType(t) {
  pendingAccType = t;
  document.querySelectorAll('#modal-content .tog-btn').forEach(b=>b.classList.remove('cash-on','card-on','tichete-on'));
  document.getElementById('acc-type-'+t).classList.add(t+'-on');
  // Auto-update emoji if user hasn't customized
  const emojiInp = document.getElementById('new-acc-emoji');
  const defaults = { cash:'💵', card:'💳', tichete:'🎟️' };
  if (Object.values(defaults).includes(emojiInp.value)) {
    emojiInp.value = defaults[t];
    pendingAccEmoji = defaults[t];
  }
}

function saveNewAcc() {
  const name  = document.getElementById('new-acc-name').value.trim();
  const emoji = document.getElementById('new-acc-emoji').value.trim() || '💵';
  const owner = document.getElementById('new-acc-owner').value;
  if (!name) { showToast('Adaugă un nume!','err'); return; }
  appData.accounts.push({ id: genId(), name, type: pendingAccType, emoji, owner });
  scheduleSave();
  closeModal();
  showToast('Cont adăugat ✓','ok');
  renderSettings();
}

function editAcc(id) {
  const acc = appData.accounts.find(a => a.id === id);
  if (acc) showAddAccountModal(acc);
}

function saveEditAcc(id) {
  const name  = document.getElementById('new-acc-name').value.trim();
  const emoji = document.getElementById('new-acc-emoji').value.trim() || '💵';
  const owner = document.getElementById('new-acc-owner').value;
  if (!name) { showToast('Adaugă un nume!','err'); return; }
  const acc = appData.accounts.find(a => a.id === id);
  if (acc) {
    acc.name  = name;
    acc.emoji = emoji;
    acc.owner = owner;
    acc.type  = pendingAccType;
  }
  scheduleSave();
  closeModal();
  showToast('Cont actualizat ✓','ok');
  renderSettings();
}

function delAcc(id, count) {
  const acc = appData.accounts.find(a => a.id === id);
  if (!acc) return;
  if (count > 0) {
    if (!confirm(`Contul "${acc.name}" are ${count} cheltuieli asociate. Dacă îl ștergi, cheltuielile rămân dar nu vor avea cont valid. Continui?`)) return;
  } else {
    if (!confirm(`Ștergi contul "${acc.name}"?`)) return;
  }
  appData.accounts = appData.accounts.filter(a => a.id !== id);
  // Also remove its budget entries
  Object.values(appData.budgets || {}).forEach(monthB => { delete monthB[id]; });
  scheduleSave();
  showToast('Cont șters','ok');
  renderSettings();
}

function addCat() {
  const emoji = document.getElementById('new-emoji').value.trim()||'📦';
  const name  = document.getElementById('new-name').value.trim();
  if (!name) { showToast('Adaugă un nume!','err'); return; }
  appData.categories.push({id:genId(),name,emoji});
  scheduleSave();
  showToast('Categorie adăugată ✓','ok');
  renderSettings();
}

function delCat(id,count) {
  const cat = getCat(id);
  if (!confirm(`Ștergi categoria "${cat.name}"${count>0?` (${count} cheltuieli afectate)`:''}?`)) return;
  appData.categories = appData.categories.filter(c=>c.id!==id);
  scheduleSave();
  showToast('Categorie ștearsă','ok');
  renderSettings();
}

function editCat(id) {
  const cat = getCat(id);
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">Editează Categoria</div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label-sm">Emoji</label>
      <input type="text" class="form-inp" id="e-emoji" value="${cat.emoji}" maxlength="2" style="text-align:center;font-size:30px">
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label-sm">Nume</label>
      <input type="text" class="form-inp" id="e-name" value="${cat.name}">
    </div>
    <button class="btn-primary" onclick="saveEditCat('${id}')">Salvează</button>`;
  openModal();
}

function saveEditCat(id) {
  const emoji = document.getElementById('e-emoji').value.trim()||'📦';
  const name  = document.getElementById('e-name').value.trim();
  if (!name) { showToast('Adaugă un nume!','err'); return; }
  const cat = appData.categories.find(c=>c.id===id);
  if (cat) { cat.emoji=emoji; cat.name=name; }
  scheduleSave();
  closeModal();
  showToast('Categorie actualizată ✓','ok');
  renderSettings();
}

function confirmReset() {
  if (!confirm(`Ștergi toate cheltuielile din ${formatMonth(selectedMonth)}?`)) return;
  appData.expenses = appData.expenses.filter(e=>monthKey(e.date)!==selectedMonth);
  scheduleSave();
  showToast('Date șterse ✓','ok');
  renderSettings();
}

// ════════════════════════════════════════════════════════════════
//  EXPENSE HTML
// ════════════════════════════════════════════════════════════════
function expHtml(exp) {
  const cat       = getCat(exp.categoryId);
  const acc       = getAccount(exp.accountId || ('acc-' + (exp.method || 'cash')));
  const type      = acc.type || 'cash';
  const isMine    = exp.addedBy === userEmail || !exp.addedBy;
  const itemCls   = type === 'cash' ? 'cash-item' : type === 'card' ? 'card-item' : 'tichete-item';
  const iconBg    = type === 'cash' ? 'var(--accent-dim)' : type === 'card' ? 'var(--card-dim)' : 'var(--tichete-dim)';
  const badgeCls  = type === 'cash' ? 'badge-cash' : type === 'card' ? 'badge-card' : 'badge-tichete';
  const author    = exp.addedBy || userEmail;
  const authorN   = ownerName(author);
  const initials  = authorN.slice(0,2).toUpperCase();
  const accLabel  = `${acc.emoji} ${acc.name}${acc.owner ? ` (${ownerName(acc.owner)})` : ''}`;

  return `
    <div class="expense-item ${itemCls}">
      <div class="exp-icon" style="background:${iconBg}">${cat.emoji}</div>
      <div class="exp-info">
        <div class="exp-desc">${exp.description}</div>
        <div class="exp-meta">
          <span class="exp-badge ${badgeCls}">${accLabel}</span>
          ${cat.name} · ${formatDate(exp.date)}
          <span class="added-by" title="Adăugat de ${author}">
            <span class="ab-avatar ${isMine?'ab-me':'ab-other'}">${initials}</span>
            ${authorN}
          </span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <div class="exp-amount">-${formatRon(exp.amount)}</div>
        <div class="exp-actions">
          <button class="icon-btn" onclick="startEdit('${exp.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="icon-btn del" onclick="deleteExpense('${exp.id}')"><svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg></button>
        </div>
      </div>
    </div>`;
}

function startEdit(id) {
  const exp = appData.expenses.find(e=>e.id===id);
  if (!exp) return;
  currentView='add';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-add').classList.add('active');
  renderAdd(exp);
}

function deleteExpense(id) {
  if (!confirm('Ștergi această cheltuială?')) return;
  appData.expenses = appData.expenses.filter(e=>e.id!==id);
  scheduleSave();
  showToast('Cheltuială ștearsă','ok');
  renderView();
}

// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function changeMonth(dir) { selectedMonth=shiftMonth(selectedMonth,dir); renderView(); }
function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

let toastTmr;
function showToast(msg,type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast show ${type}`;
  clearTimeout(toastTmr);
  toastTmr = setTimeout(()=>{ t.className='toast'; }, 2800);
}

function signOut() {
  accessToken = null;
  tokenExpiry = 0;
  fileId      = '';
  appData     = null;
  localStorage.removeItem(LS.fileId);
  if (window.google?.accounts?.oauth2) google.accounts.oauth2.revoke(accessToken, ()=>{});
  showSetupSignIn();
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstall = e;
});
</script>
