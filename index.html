<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Cheltuieli RON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --surface2:#1e2530; --surface3:#252d3a;
      --border:#2a3441; --accent:#00d68f; --accent-dim:rgba(0,214,143,0.12);
      --text:#e8edf3; --text2:#8b96a5; --text3:#5a6474;
      --danger:#ff5c5c; --danger-dim:rgba(255,92,92,0.12);
      --card-color:#4f8ef7; --card-dim:rgba(79,142,247,0.12);
      --tichete:#f5a623; --tichete-dim:rgba(245,166,35,0.14);
      --radius:16px; --radius-sm:10px;
      --nav-h:72px; --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Lexend',sans-serif;font-size:15px;line-height:1.5}
    #root{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

    .screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .screen::-webkit-scrollbar{display:none}
    .screen.has-nav{padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}

    #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999}
    .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loader p{font-size:13px;color:var(--text2)}

    .setup-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
    .setup-logo{font-size:52px;margin-bottom:8px}
    .setup-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700;text-align:center;margin-bottom:6px}
    .setup-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;line-height:1.6;max-width:340px}
    .setup-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:14px}
    .setup-card h3{font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin-bottom:14px}
    .step-row{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--border)}
    .step-row:first-of-type{border-top:none;padding-top:4px}
    .step-num{width:24px;height:24px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(0,214,143,.3);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .step-text{font-size:13px;color:var(--text2);line-height:1.65;flex:1}
    .step-text strong{color:var(--text);font-weight:600}
    .step-text code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--accent);font-family:monospace;word-break:break-all}
    .step-text a{color:var(--accent);text-decoration:underline}
    .form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;margin-top:8px}
    .form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;color:var(--text);font-family:'Lexend',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
    .form-input:focus{border-color:var(--accent)}
    .form-input.mono{font-family:monospace;font-size:12px;letter-spacing:.5px}
    .btn-primary{width:100%;padding:15px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#0d1117;font-family:'Lexend',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px}
    .btn-primary:active{transform:scale(.98);opacity:.9}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-secondary{width:100%;padding:13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Lexend',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
    .btn-secondary:active{background:var(--surface3)}
    .btn-danger{background:var(--danger-dim);border-color:rgba(255,92,92,.3);color:var(--danger)}
    .link-btn{background:none;border:none;color:var(--accent);font-family:'Lexend',sans-serif;font-size:13px;cursor:pointer;text-decoration:underline;padding:0}
    .opt-tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--surface2);padding:4px;border-radius:var(--radius-sm)}
    .opt-tab{flex:1;padding:10px;text-align:center;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;font-family:'Lexend',sans-serif}
    .opt-tab.active{background:var(--accent);color:#0d1117;font-weight:700}

    /* Google sign-in container */
    #gsi-container{display:flex;justify-content:center;margin:6px 0}
    .signin-fallback{margin-top:12px;text-align:center}

    /* SYNC BAR */
    #sync-bar{padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);background:var(--bg);min-height:36px}
    .sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .sync-dot.ok{background:var(--accent);animation:pulse 2.5s infinite}
    .sync-dot.syncing{background:var(--card-color);animation:spin .8s linear infinite;border-top-color:transparent}
    .sync-dot.error{background:var(--danger)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .sync-user{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
    .avatar{width:20px;height:20px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(0,214,143,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase}
    .sync-btn{padding:4px 10px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-family:'Lexend',sans-serif;font-size:11px;cursor:pointer;white-space:nowrap}
    .sync-btn:active{background:var(--surface3);transform:scale(.95)}

    /* BOTTOM NAV */
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:'Lexend',sans-serif;transition:color .2s}
    .nav-item.active{color:var(--accent)}
    .nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .nav-item span{font-size:10px;font-weight:500}
    .nav-add{width:52px;height:52px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-20px;box-shadow:0 4px 20px rgba(0,214,143,.4);transition:transform .2s}
    .nav-add:active{transform:scale(.92)}
    .nav-add svg{stroke:#0d1117;width:24px;height:24px;stroke-width:2.5}

    .page-header{padding:16px 20px 10px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid transparent;transition:border-color .2s}
    .page-header.scrolled{border-color:var(--border)}
    .page-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;letter-spacing:-.5px}
    .page-subtitle{font-size:12px;color:var(--text2);margin-top:2px}

    .month-picker{display:flex;align-items:center;gap:12px;padding:0 20px 14px}
    .month-btn{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
    .month-btn:active{transform:scale(.9)}
    .month-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .month-label{flex:1;text-align:center;font-size:15px;font-weight:600}

    .big-summary{margin:0 20px 12px;background:linear-gradient(135deg,#1a2535,#0f1a2a);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
    .big-summary::after{content:'lei';position:absolute;right:16px;bottom:8px;font-family:'Fraunces',serif;font-size:64px;font-weight:700;color:rgba(255,255,255,.03);line-height:1}
    .big-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2)}
    .big-value{font-family:'Fraunces',serif;font-size:40px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1.1;margin-top:4px}
    .big-value span{font-size:18px;color:var(--text2);font-weight:400}
    .progress-bar{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:12px}
    .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#00a8d6);transition:width .6s}
    .progress-fill.over{background:linear-gradient(90deg,#f5a623,var(--danger))}
    .progress-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--text2)}

    .acc-cards-row{display:flex;gap:10px;overflow-x:auto;padding:0 20px 12px;scroll-snap-type:x mandatory}
    .acc-cards-row::-webkit-scrollbar{display:none}
    .acc-card{flex-shrink:0;width:148px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;position:relative;overflow:hidden;scroll-snap-align:start}

    /* Grid layout for 1-3 accounts */
    .acc-cards-grid{display:grid;gap:10px;padding:0 20px 12px}
    .acc-cards-grid.cols-1{grid-template-columns:1fr}
    .acc-cards-grid.cols-2{grid-template-columns:1fr 1fr}
    .acc-cards-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
    .acc-cards-grid .acc-card{width:auto}
    .acc-cards-grid.cols-1 .acc-card{padding:16px 18px}
    .acc-cards-grid.cols-1 .ac-spent{font-size:24px}

    /* Scroll hint indicator */
    .scroll-hint{display:flex;justify-content:center;align-items:center;gap:6px;padding:0 20px 14px;font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.4px}
    .scroll-hint .arrow{display:inline-block;animation:slideRight 1.4s ease-in-out infinite}
    @keyframes slideRight{
      0%,100%{transform:translateX(0);opacity:.4}
      50%{transform:translateX(4px);opacity:1}
    }
    .scroll-dots{display:flex;gap:4px;align-items:center}
    .scroll-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);transition:all .2s}
    .scroll-dot.active{background:var(--accent);width:14px;border-radius:99px}
    .acc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .acc-card.t-cash::before{background:var(--accent)}
    .acc-card.t-card::before{background:var(--card-color)}
    .acc-card.t-tichete::before{background:var(--tichete)}
    .ac-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
    .ac-emoji{font-size:18px}
    .ac-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .ac-owner-tag{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ac-spent{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px;line-height:1.1}
    .ac-spent .cur{font-size:11px;font-weight:400;color:var(--text2);margin-left:2px}
    .ac-rem{font-size:10px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ac-rem.over{color:var(--danger)}

    .section{padding:0 20px 16px}
    .section-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:10px}

    .expense-list{display:flex;flex-direction:column;gap:8px}
    .expense-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 13px 13px 15px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
    .expense-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
    .expense-item.cash-item::before{background:var(--accent)}
    .expense-item.card-item::before{background:var(--card-color)}
    .expense-item.tichete-item::before{background:var(--tichete)}
    .exp-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .exp-info{flex:1;min-width:0}
    .exp-desc{font-weight:500;color:var(--text);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .exp-meta{font-size:11px;color:var(--text2);margin-top:2px}
    .exp-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:99px;font-size:9px;font-weight:600;margin-right:4px}
    .badge-cash{background:var(--accent-dim);color:var(--accent)}
    .badge-card{background:var(--card-dim);color:var(--card-color)}
    .badge-tichete{background:var(--tichete-dim);color:var(--tichete)}
    .added-by{display:inline-flex;align-items:center;gap:4px;padding:1px 7px 1px 2px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);font-size:9px;font-weight:600;color:var(--text2);margin-left:4px}
    .added-by .ab-avatar{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;text-transform:uppercase;flex-shrink:0}
    .ab-me{background:var(--accent)}
    .ab-other{background:var(--card-color)}
    .exp-amount{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--danger);white-space:nowrap}
    .exp-actions{display:flex;gap:5px}
    .icon-btn{width:30px;height:30px;border-radius:8px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
    .icon-btn:active{transform:scale(.88)}
    .icon-btn.del:active{background:var(--danger-dim);color:var(--danger)}
    .icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .empty-state{text-align:center;padding:36px 20px;color:var(--text2)}
    .empty-state .emoji{font-size:44px;margin-bottom:10px}
    .empty-state p{font-size:13px}

    .form-view{padding:0 20px}
    .form-group{margin-bottom:16px}
    .form-label-sm{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin-bottom:7px}
    .form-inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;color:var(--text);font-family:'Lexend',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
    .form-inp:focus{border-color:var(--accent)}
    .amount-inp{font-family:'Fraunces',serif;font-size:30px;font-weight:700;text-align:center;letter-spacing:-.5px}
    .amount-wrap{position:relative}
    .amount-cur{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text2);pointer-events:none}

    .acc-picker{display:flex;gap:7px;overflow-x:auto;padding:3px 0 5px}
    .acc-picker::-webkit-scrollbar{display:none}
    .acc-pill{flex-shrink:0;min-width:88px;padding:11px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Lexend',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2;text-align:center}
    .acc-pill .ap-emoji{font-size:18px}
    .acc-pill .ap-name{white-space:nowrap;font-size:12px}
    .acc-pill .ap-owner{font-size:9px;color:var(--text3);font-weight:600;margin-top:1px}
    .acc-pill.sel-cash{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .acc-pill.sel-cash .ap-owner{color:var(--accent)}
    .acc-pill.sel-card{background:var(--card-dim);border-color:var(--card-color);color:var(--card-color)}
    .acc-pill.sel-card .ap-owner{color:var(--card-color)}
    .acc-pill.sel-tichete{background:var(--tichete-dim);border-color:var(--tichete);color:var(--tichete)}
    .acc-pill.sel-tichete .ap-owner{color:var(--tichete)}

    .toggle-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .tog-btn{padding:11px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Lexend',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
    .tog-btn .tog-emoji{font-size:18px}
    .tog-btn.cash-on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .tog-btn.card-on{background:var(--card-dim);border-color:var(--card-color);color:var(--card-color)}
    .tog-btn.tichete-on{background:var(--tichete-dim);border-color:var(--tichete);color:var(--tichete)}

    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
    .cat-btn{padding:9px 5px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Lexend',sans-serif;font-size:11px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
    .cat-btn .ce{font-size:19px}
    .cat-btn.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

    .budget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
    .bud-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .bud-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px}
    .bud-icon.cash-icon{background:var(--accent-dim)}
    .bud-icon.card-icon{background:var(--card-dim)}
    .bud-icon.tichete-icon{background:var(--tichete-dim)}
    .bud-title{font-size:15px;font-weight:600}
    .bud-desc{font-size:11px;color:var(--text2)}
    .bud-row{display:flex;gap:8px;align-items:center}
    .bud-inp-wrap{flex:1;position:relative}
    .bud-inp-wrap input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 44px 11px 12px;color:var(--text);font-family:'Fraunces',serif;font-size:19px;font-weight:700;outline:none;-webkit-appearance:none}
    .bud-inp-wrap input:focus{border-color:var(--accent)}
    .bud-inp-wrap .sfx{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text2);pointer-events:none}
    .save-btn{padding:11px 16px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#0d1117;font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
    .save-btn:active{transform:scale(.95)}
    .stat-row{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--border)}
    .stat-label{font-size:12px;color:var(--text2)}
    .stat-value{font-size:12px;font-weight:600}
    .green{color:var(--accent)}
    .red{color:var(--danger)}

    .acc-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;position:relative;overflow:hidden}
    .acc-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
    .acc-item.t-cash::before{background:var(--accent)}
    .acc-item.t-card::before{background:var(--card-color)}
    .acc-item.t-tichete::before{background:var(--tichete)}
    .acc-item-emoji{font-size:20px;width:30px;text-align:center}
    .acc-item-info{flex:1;min-width:0}
    .acc-item-name{font-weight:500;font-size:13px}
    .acc-item-meta{font-size:10px;color:var(--text2);margin-top:1px}

    /* Empty analytics state */

    .analytics-empty .emoji{font-size:48px;margin-bottom:14px;opacity:.6}
    #debug-panel{margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:monospace;font-size:11px;color:var(--text3);max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}

<div id="loader"><div class="spinner"></div><p id="loader-msg">Se încarcă…</p></div>
<div id="root" style="display:none"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════
const LS = {
  clientId:  'cheltuieli_clientId',
  fileId:    'cheltuieli_fileId',
  userEmail: 'cheltuieli_email',
  userName:  'cheltuieli_name',
};
const DRIVE_FILE_NAME = 'cheltuieli-ron-database.json';
const DRIVE_API    = 'https://www.googleapis.com/drive/v3';
const DRIVE_UPLOAD = 'https://www.googleapis.com/upload/drive/v3';
const SCOPE = 'https://www.googleapis.com/auth/drive.file';

const DEFAULT_CATEGORIES = [
  {id:'c1',name:'Mâncare',emoji:'🍔'},{id:'c2',name:'Transport',emoji:'🚗'},
  {id:'c3',name:'Utilități',emoji:'💡'},{id:'c4',name:'Divertisment',emoji:'🎬'},
  {id:'c5',name:'Sănătate',emoji:'💊'},{id:'c6',name:'Îmbrăcăminte',emoji:'👕'},
  {id:'c7',name:'Educație',emoji:'📚'},{id:'c8',name:'Casă',emoji:'🏠'},
  {id:'c9',name:'Altele',emoji:'📦'},
];
const DEFAULT_ACCOUNTS = [
  { id:'acc-cash',    name:'Cash',         type:'cash',    emoji:'💵', owner:'' },
  { id:'acc-card',    name:'Card',         type:'card',    emoji:'💳', owner:'' },
  { id:'acc-tichete', name:'Tichete Masă', type:'tichete', emoji:'🎟️', owner:'' },
];

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let clientId = localStorage.getItem(LS.clientId) || '';
let fileId   = localStorage.getItem(LS.fileId)   || '';
let userEmail = localStorage.getItem(LS.userEmail) || '';
let userName  = localStorage.getItem(LS.userName)  || '';

let accessToken = null;
let tokenExpiry = 0;
let tokenClient = null;
let appData = null;
let syncStatus = 'idle';
let lastSyncAt = null;
let lastSyncBy = '';
let saveTimer = null;
let debugMessages = [];

let currentView = 'home';
let selectedMonth = todayMonth();
let expFilter = 'all';
let editingId = null;
let addForm = { amount:'', description:'', categoryId:'', accountId:'', date: todayStr() };
let pendingAccType = 'cash';

// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function todayStr()   { return new Date().toISOString().split('T')[0]; }
function todayMonth() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function genId()      { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function monthKey(s)  { return s ? s.slice(0,7) : ''; }
function formatMonth(ym) {
  const [y,m] = ym.split('-');
  return ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'][+m-1]+' '+y;
}
function shiftMonth(ym,dir) {
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function formatRon(n) { return new Intl.NumberFormat('ro-RO',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0); }
function formatDate(s) { if(!s) return ''; return new Date(s+'T00:00:00').toLocaleDateString('ro-RO',{day:'numeric',month:'short'}); }
function formatTime(d) { if(!d) return ''; return new Date(d).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}); }
function getCat(id) { return appData?.categories?.find(c=>c.id===id)||{name:'Altele',emoji:'📦'}; }
function getAccount(id) { return appData?.accounts?.find(a=>a.id===id) || {id,name:'?',type:'cash',emoji:'💵',owner:''}; }
function ownerN(name) { return name||''; }
function monthExps() { return (appData?.expenses||[]).filter(e=>monthKey(e.date)===selectedMonth); }
function emptyDB() {
  return {
    version: 3,
    lastModified: new Date().toISOString(),
    lastModifiedBy: userName,
    expenses: [],
    categories: [...DEFAULT_CATEGORIES],
    accounts: [...DEFAULT_ACCOUNTS],
    budgets: {},
  };
}
function migrateDB(d) {
  if (!d) return d;
  if (!d.accounts?.length) d.accounts = [...DEFAULT_ACCOUNTS];
  if (!d.categories?.length) d.categories = [...DEFAULT_CATEGORIES];
  if (!d.budgets) d.budgets = {};
  if (!d.expenses) d.expenses = [];
  d.expenses.forEach(e => { if (!e.accountId) e.accountId = 'acc-' + (e.method || 'cash'); });
  return d;
}

// Decode JWT id_token to get email/name without API call
function decodeJWT(token) {
  try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(jsonPayload);
  } catch (e) {
    debugLog('JWT decode failed: ' + e.message, 'err');
    return null;
  }
}

function debugLog(msg, type='info') {
  const time = new Date().toLocaleTimeString('ro-RO');
  debugMessages.push({ time, msg, type });
  if (debugMessages.length > 50) debugMessages.shift();
  const panel = document.getElementById('debug-panel');
  if (panel && panel.classList.contains('show')) {
    renderDebugPanel();
  }
  console.log(`[${time}] ${msg}`);
}

function renderDebugPanel() {
  const panel = document.getElementById('debug-panel');
  if (!panel) return;
  panel.innerHTML = debugMessages.map(m =>
    `<div class="debug-line ${m.type}">${m.time}: ${m.msg.replace(/</g,'&lt;')}</div>`
  ).join('');
  panel.scrollTop = panel.scrollHeight;
}

function toggleDebug() {
  const panel = document.getElementById('debug-panel');
  if (!panel) return;
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) renderDebugPanel();
}

// ════════════════════════════════════════════════════════════════
//  GOOGLE SIGN-IN (using ID token)
// ════════════════════════════════════════════════════════════════
let gisReady = false;

function waitForGIS() {
  return new Promise((resolve) => {
    if (window.google?.accounts?.id && window.google?.accounts?.oauth2) {
      gisReady = true;
      resolve(true);
      return;
    }
    let attempts = 0;
    const check = setInterval(() => {
      attempts++;
      if (window.google?.accounts?.id && window.google?.accounts?.oauth2) {
        clearInterval(check);
        gisReady = true;
        debugLog('Google library ready (after ' + attempts + ' attempts)', 'ok');
        resolve(true);
      } else if (attempts > 100) { // 10 sec timeout
        clearInterval(check);
        debugLog('Google library timeout!', 'err');
        resolve(false);
      }
    }, 100);
  });
}

// Step 1: Get ID token (gives us email/name) via the rendered button
function handleCredentialResponse(response) {
  debugLog('Got credential response', 'ok');
  const payload = decodeJWT(response.credential);
  if (!payload) {
    showToast('Token invalid', 'err');
    return;
  }
  userEmail = payload.email || '';
  userName  = payload.name || payload.given_name || (userEmail.split('@')[0]) || 'User';
  localStorage.setItem(LS.userEmail, userEmail);
  localStorage.setItem(LS.userName, userName);
  debugLog('User: ' + userEmail + ' / ' + userName, 'ok');
  // Now request access token for Drive
  requestDriveAccessToken();
}

// Step 2: Request Drive access token
function requestDriveAccessToken() {
  debugLog('Requesting Drive access token...', 'info');
  if (!tokenClient) {
    try {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: SCOPE,
        callback: (resp) => {
          if (resp.error) {
            debugLog('Token error: ' + resp.error, 'err');
            showToast('Eroare token: ' + resp.error, 'err');
            return;
          }
          accessToken = resp.access_token;
          tokenExpiry = Date.now() + (resp.expires_in * 1000);
          debugLog('Got access token!', 'ok');
          afterDriveAuth();
        },
        error_callback: (err) => {
          debugLog('Token error_callback: ' + JSON.stringify(err), 'err');
          showToast('Eroare: ' + (err.message || err.type), 'err');
        }
      });
    } catch (e) {
      debugLog('initTokenClient failed: ' + e.message, 'err');
      showToast('Eroare init: ' + e.message, 'err');
      return;
    }
  }
  try {
    tokenClient.requestAccessToken({ prompt: '' });
  } catch (e) {
    debugLog('requestAccessToken failed: ' + e.message, 'err');
    showToast('Eroare: ' + e.message, 'err');
  }
}

async function afterDriveAuth() {
  if (!fileId) { showSetupDatabase(); }
  else { await startApp(); }
}

async function ensureToken() {
  if (accessToken && Date.now() < tokenExpiry - 60_000) return;
  return new Promise((resolve, reject) => {
    if (!tokenClient) { reject(new Error('No token client')); return; }
    tokenClient.callback = (resp) => {
      if (resp.error) { reject(new Error(resp.error)); return; }
      accessToken = resp.access_token;
      tokenExpiry = Date.now() + (resp.expires_in * 1000);
      resolve();
    };
    tokenClient.requestAccessToken({ prompt: '' });
  });
}

// ════════════════════════════════════════════════════════════════
//  DRIVE API
// ════════════════════════════════════════════════════════════════
async function driveRequest(url, options = {}) {
  await ensureToken();
  const resp = await fetch(url, {
    ...options,
    headers: { 'Authorization': `Bearer ${accessToken}`, ...(options.headers || {}) },
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  return resp;
}

async function driveGetFile(id) {
  const resp = await driveRequest(`${DRIVE_API}/files/${id}?alt=media`);
  return resp.json();
}

async function driveCreateFile(name, content) {
  const metaResp = await driveRequest(`${DRIVE_API}/files`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/json' }),
  });
  const meta = await metaResp.json();
  await driveUpdateFile(meta.id, content);
  return meta.id;
}

async function driveUpdateFile(id, content) {
  await driveRequest(`${DRIVE_UPLOAD}/files/${id}?uploadType=media`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(content),
  });
}

async function loadData() {
  setSyncStatus('syncing');
  try {
    const data = await driveGetFile(fileId);
    appData = migrateDB(data);
    lastSyncAt = new Date();
    lastSyncBy = data.lastModifiedBy || '';
    setSyncStatus('ok');
    return data;
  } catch(err) {
    setSyncStatus('error');
    throw err;
  }
}

async function saveData() {
  if (!fileId || !appData) return;
  setSyncStatus('syncing');
  try {
    appData.lastModified = new Date().toISOString();
    appData.lastModifiedBy = userName;
    await driveUpdateFile(fileId, appData);
    lastSyncAt = new Date();
    lastSyncBy = userName;
    setSyncStatus('ok');
    renderSyncBar();
  } catch(err) {
    setSyncStatus('error');
    renderSyncBar();
    showToast('Eroare sync: ' + err.message, 'err');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveData(), 1500);
}

function setSyncStatus(s) { syncStatus = s; renderSyncBar(); }

// Fallback manual sign-in (uses popup token directly, then tries to extract email)
function manualSignIn() {
  debugLog('Manual sign-in starting', 'info');
  if (!tokenClient) {
    try {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: SCOPE,
        callback: async (resp) => {
          if (resp.error) {
            debugLog('Manual error: ' + resp.error, 'err');
            showToast('Eroare: ' + resp.error, 'err');
            return;
          }
          accessToken = resp.access_token;
          tokenExpiry = Date.now() + (resp.expires_in * 1000);
          debugLog('Got token via manual flow', 'ok');
          // Try to get email from Drive about endpoint
          try {
            const r = await driveRequest(`${DRIVE_API}/about?fields=user`);
            const data = await r.json();
            userEmail = data.user?.emailAddress || '';
            userName  = data.user?.displayName  || userEmail.split('@')[0] || 'User';
            debugLog('Got user from Drive: ' + userEmail, 'ok');
          } catch(e) {
            debugLog('Drive about failed, using prompt: ' + e.message, 'err');
            userEmail = prompt('Introdu adresa ta de email:') || 'user@unknown';
            userName  = prompt('Introdu numele tău:') || userEmail.split('@')[0];
          }
          localStorage.setItem(LS.userEmail, userEmail);
          localStorage.setItem(LS.userName, userName);
          afterDriveAuth();
        },
        error_callback: (err) => {
          debugLog('Manual error_callback: ' + JSON.stringify(err), 'err');
          showToast('Eroare: ' + (err.message || err.type), 'err');
        }
      });
    } catch (e) {
      debugLog('Init manual failed: ' + e.message, 'err');
      showToast('Eroare: ' + e.message, 'err');
      return;
    }
  }
  try {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } catch (e) {
    debugLog('requestAccessToken manual failed: ' + e.message, 'err');
  }
}

  if (accounts.length) {
    const useGrid = accounts.length <= 3;
    const cardsHtml = accounts.map((acc, idx) => {
      const spent = spentFor(acc.id);
      const bud = monthBudget[acc.id] || 0;
      const remA = bud - spent;
      return `
        <div class="acc-card t-${acc.type}" data-acc-idx="${idx}">
          <div class="ac-hdr"><span class="ac-emoji">${acc.emoji}</span><span class="ac-name">${acc.name}</span></div>
          ${acc.owner ? `<div class="ac-owner-tag">👤 ${acc.owner}</div>` : `<div class="ac-owner-tag" style="color:var(--text3)">comun</div>`}
          <div style="height:6px"></div>
          <div class="ac-spent">${formatRon(spent)}<span class="cur">lei</span></div>
          <div class="ac-rem ${remA<0?'over':''}">${bud>0?(remA>=0?`${formatRon(remA)} rămas`:`${formatRon(Math.abs(remA))} depășit`):'— fără buget'}</div>
        </div>`;
    }).join('');

    html += `<div class="section-title" style="padding:0 20px 8px;margin:0;display:flex;justify-content:space-between;align-items:center">
      <span>📊 Conturi (${accounts.length})</span>
      ${!useGrid ? `<span style="font-size:9px;color:var(--text3);font-weight:500;letter-spacing:.3px;text-transform:none">← swipe →</span>` : ''}
    </div>`;

    if (useGrid) {
      // 1-3 accounts: grid layout, all visible
      html += `<div class="acc-cards-grid cols-${accounts.length}">${cardsHtml}</div>`;
    } else {
      // 4+ accounts: horizontal scroll with dots indicator
      html += `<div class="acc-cards-row" id="acc-scroll-row">${cardsHtml}</div>`;
      // Page-style dots: round up to pages of ~2 cards visible at once
      const dotsCount = Math.min(accounts.length, 6);
      let dotsHtml = '<div class="scroll-dots">';
      for (let i = 0; i < dotsCount; i++) {
        dotsHtml += `<div class="scroll-dot ${i===0?'active':''}" data-dot-idx="${i}"></div>`;
      }
      dotsHtml += '</div>';
      html += `<div class="scroll-hint">${dotsHtml}</div>`;
    }
  }

  const recent = [...exps].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  html += `<div class="section"><div class="section-title">Cheltuieli recente</div>`;
  if (!recent.length) html += `<div class="empty-state"><div class="emoji">🧾</div><p>Nicio cheltuială.<br>Apasă <strong>+</strong> pentru a adăuga.</p></div>`;
  else {
    html += `<div class="expense-list">${recent.map(expHtml).join('')}</div>`;
    if (exps.length>5) html += `<div style="text-align:center;margin-top:12px"><button class="btn-secondary" style="width:auto;padding:9px 22px" onclick="navigate('expenses')">Vezi toate (${exps.length})</button></div>`;
  }
  html += `</div>`;
  c.innerHTML = html;

  // Wire up scroll dots if we're using horizontal scroll
  const scrollRow = document.getElementById('acc-scroll-row');
  if (scrollRow) {
    const dots = document.querySelectorAll('.scroll-dot');
    if (dots.length > 0) {
      scrollRow.addEventListener('scroll', () => {
        const cardWidth = 148 + 10; // card width + gap
        const idx = Math.round(scrollRow.scrollLeft / cardWidth);
        const clampedIdx = Math.min(Math.max(idx, 0), dots.length - 1);
        dots.forEach((d, i) => d.classList.toggle('active', i === clampedIdx));
      });
    }
  }
}

function renderExpenses() {
  const c = document.getElementById('view-content');
  const exps = monthExps();
  let filtered = exps;
  if (expFilter !== 'all') filtered = exps.filter(e=>e.accountId===expFilter);
  const sorted = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));

  let html = `
    <div class="page-header"><div class="page-title">Cheltuieli</div><div class="page-subtitle">${formatMonth(selectedMonth)}</div></div>
    <div class="month-picker">
      <button class="month-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></button>
      <div class="month-label">${formatMonth(selectedMonth)}</div>
      <button class="month-btn" onclick="changeMonth(1)"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></button>
    </div>
    <div class="filter-bar">
      <div class="chip ${expFilter==='all'?'active':''}" onclick="setFilter('all')">Toate (${exps.length})</div>`;
  (appData.accounts||[]).forEach(acc => {
    const n = exps.filter(e=>e.accountId===acc.id).length;
    const ol = acc.owner ? ` · ${acc.owner}` : '';
    html += `<div class="chip ${expFilter===acc.id?'active':''}" onclick="setFilter('${acc.id}')">${acc.emoji} ${acc.name}${ol} (${n})</div>`;
  });
  html += `</div><div class="section">`;

  if (!sorted.length) html += `<div class="empty-state"><div class="emoji">📭</div><p>Nicio cheltuială pentru filtru.</p></div>`;
  else {
    const groups = {};
    sorted.forEach(e=>{ if(!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });
    html += `<div class="expense-list">`;
    Object.entries(groups).forEach(([date,items])=>{
      const dt = items.reduce((s,e)=>s+e.amount,0);
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0 3px;border-top:1px solid var(--border);margin-top:4px">
        <span style="font-size:11px;font-weight:600;color:var(--text2)">${formatDate(date)}</span>
        <span style="font-size:11px;color:var(--text3)">${formatRon(dt)} lei</span>
      </div>${items.map(expHtml).join('')}`;
    });
    html += `</div>`;
    const total = filtered.reduce((s,e)=>s+e.amount,0);
    html += `<div style="margin-top:14px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:600;color:var(--text2)">Total</span>
      <span style="font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:var(--danger)">${formatRon(total)} <span style="font-size:12px;color:var(--text2)">lei</span></span>
    </div>`;
  }
  html += `</div>`;
  c.innerHTML = html;
}

function selectCat(id,el) { addForm.categoryId=id; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel')); el.classList.add('sel'); }
function selectAccount(id,type,el) {
  addForm.accountId = id;

  el.classList.add('sel-'+type);

function saveExpense() {
  const amount = parseFloat(addForm.amount);
  if (!amount||amount<=0) { showToast('Sumă invalidă!','err'); return; }
  if (!addForm.description.trim()) { showToast('Adaugă o descriere!','err'); return; }
  if (!addForm.date) { showToast('Selectează data!','err'); return; }
  if (!addForm.accountId) { showToast('Alege un cont!','err'); return; }
  if (!addForm.categoryId) addForm.categoryId = appData.categories[0]?.id||'c9';

  const acc = getAccount(addForm.accountId);
  const rec = {
    id: editingId||genId(), amount,
    description: addForm.description.trim(),
    categoryId: addForm.categoryId, accountId: addForm.accountId,
    method: acc.type, date: addForm.date,
    addedBy: userName, updatedAt: new Date().toISOString(),
  };
  if (editingId) {
    const idx = appData.expenses.findIndex(e=>e.id===editingId);
    if (idx!==-1) appData.expenses[idx] = {...appData.expenses[idx], ...rec};
    showToast('Actualizat ✓','ok');
  } else {
    rec.createdAt = new Date().toISOString();
    appData.expenses.push(rec);
    showToast('Adăugat ✓','ok');
  }
  selectedMonth = monthKey(addForm.date);
  scheduleSave();
  navigate('home');
}

function renderBudget() {

  const totalBudget = accounts.reduce((s,a)=>s+(Number(monthBudget[a.id])||0),0);
  const totalSpent = exps.reduce((s,e)=>s+e.amount,0);

  let html = `
    <div class="page-header"><div class="page-title">Buget</div><div class="page-subtitle">${formatMonth(selectedMonth)}</div></div>

      html += `
        <div class="budget-card">
          <div class="bud-hdr"><div class="bud-icon ${iconCls}">${acc.emoji}</div>
            <div style="flex:1;min-width:0">
              <div class="bud-title">${acc.name}</div>

            </div>

          <div class="bud-row">
            <div class="bud-inp-wrap"><input type="number" id="bud-${acc.id}" value="${bud||''}" placeholder="0" inputmode="decimal" step="0.01"><span class="sfx">lei</span></div>
            <button class="save-btn" onclick="saveBudget('${acc.id}')">Salvează</button>

        <div class="stat-row"><span class="stat-label">Total rămas</span><span class="stat-value ${(totalBudget-totalSpent)>=0?'green':'red'}">${formatRon(totalBudget-totalSpent)} lei</span></div>
      </div>`;
  }
  html += `</div>`;
  c.innerHTML = html;
}

function saveBudget(accountId) {
  const val = parseFloat(document.getElementById(`bud-${accountId}`).value)||0;
  if (!appData.budgets) appData.budgets = {};
  if (!appData.budgets[selectedMonth]) appData.budgets[selectedMonth] = {};
  appData.budgets[selectedMonth][accountId] = val;
  scheduleSave();
  showToast(`Buget salvat ✓`,'ok');
  renderBudget();
}

// ── PIE CHART by category ──
function renderPieChart(exps) {
  const totals = {};
  exps.forEach(e => { totals[e.categoryId] = (totals[e.categoryId]||0) + e.amount; });
  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const total = sorted.reduce((s,[,v])=>s+v, 0);
  if (total === 0) return '';

  // Build SVG pie with conic-gradient style using SVG paths
  let cumulative = 0;
  const cx = 90, cy = 90, r = 75, innerR = 48;
  let paths = '';
  sorted.forEach(([catId, amt], i) => {
    const pct = amt / total;
    const startAngle = cumulative * 2 * Math.PI - Math.PI / 2;
    cumulative += pct;
    const endAngle = cumulative * 2 * Math.PI - Math.PI / 2;
    const color = CHART_COLORS[i % CHART_COLORS.length];

    if (pct === 1) {
      // Full circle (single category)
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/>
                <circle cx="${cx}" cy="${cy}" r="${innerR}" fill="var(--surface)"/>`;
    } else {
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const x3 = cx + innerR * Math.cos(endAngle);
      const y3 = cy + innerR * Math.sin(endAngle);
      const x4 = cx + innerR * Math.cos(startAngle);
      const y4 = cy + innerR * Math.sin(startAngle);
      const largeArc = pct > 0.5 ? 1 : 0;
      paths += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} L ${x3} ${y3} A ${innerR} ${innerR} 0 ${largeArc} 0 ${x4} ${y4} Z" fill="${color}"/>`;
    }
  });

  const legendItems = sorted.map(([catId, amt], i) => {
    const cat = getCat(catId);
    const pct = (amt / total * 100).toFixed(1);
    return `
      <div class="legend-item">
        <div class="legend-dot" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></div>
        <div class="legend-label">${cat.emoji} ${cat.name}</div>
        <div class="legend-value">${formatRon(amt)}</div>
        <div class="legend-pct">${pct}%</div>
      </div>`;
  }).join('');

  return `
    <div class="chart-card">
      <div class="chart-title">📊 Distribuție pe categorii</div>
      <div class="chart-subtitle">Cum s-au împărțit cheltuielile</div>
      <div class="pie-wrap">
        <div class="pie-chart">
          <svg viewBox="0 0 180 180" width="180" height="180">${paths}</svg>
          <div class="pie-center">
            <div class="pie-center-val">${formatRon(total)}</div>
            <div class="pie-center-lbl">total lei</div>
          </div>
        </div>
        <div class="legend">${legendItems}</div>
      </div>
    </div>`;
}

// ── BAR CHART by category ──
function renderBarChart(exps) {
  const totals = {};
  exps.forEach(e => { totals[e.categoryId] = (totals[e.categoryId]||0) + e.amount; });
  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  if (!sorted.length) return '';
  const max = sorted[0][1];

  const rows = sorted.map(([catId, amt], i) => {
    const cat = getCat(catId);
    const widthPct = (amt / max) * 100;

    return `

        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${widthPct}%;background:${color}"></div></div>

// ── DAILY TREND (line chart) ──
function renderDailyTrend(exps) {
  const [year, month] = selectedMonth.split('-').map(Number);
  const daysInMonth = new Date(year, month, 0).getDate();
  const dailyTotals = new Array(daysInMonth).fill(0);
  exps.forEach(e => {
    const day = parseInt(e.date.split('-')[2]) - 1;
    if (day >= 0 && day < daysInMonth) dailyTotals[day] += e.amount;
  });

  const maxDaily = Math.max(...dailyTotals, 1);
  const W = 320, H = 140, PAD_L = 8, PAD_R = 8, PAD_T = 12, PAD_B = 22;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;
  const stepX = innerW / Math.max(1, daysInMonth - 1);

  const points = dailyTotals.map((v, i) => ({
    x: PAD_L + i * stepX,
    y: PAD_T + innerH - (v / maxDaily) * innerH,
    val: v,
    day: i + 1,
  }));

  const linePath = points.map((p, i) => (i === 0 ? 'M' : 'L') + ` ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L ${points[points.length-1].x.toFixed(1)} ${PAD_T + innerH} L ${points[0].x.toFixed(1)} ${PAD_T + innerH} Z`;

  // X-axis labels: every 5 days
  const xLabels = [];
  for (let i = 0; i < daysInMonth; i += 5) {
    xLabels.push(`<text x="${(PAD_L + i * stepX).toFixed(1)}" y="${H - 6}" text-anchor="middle" class="line-label">${i + 1}</text>`);
  }
  if ((daysInMonth - 1) % 5 !== 0) {
    xLabels.push(`<text x="${(PAD_L + (daysInMonth-1) * stepX).toFixed(1)}" y="${H - 6}" text-anchor="middle" class="line-label">${daysInMonth}</text>`);
  }

  // Y-axis grid
  const gridLines = [];
  for (let i = 1; i <= 3; i++) {
    const y = PAD_T + (innerH * i / 4);
    gridLines.push(`<line x1="${PAD_L}" x2="${W - PAD_R}" y1="${y}" y2="${y}" class="line-grid"/>`);
  }

  // Highlight peak day
  const peakIdx = dailyTotals.indexOf(Math.max(...dailyTotals));
  const peakDot = peakIdx >= 0 && dailyTotals[peakIdx] > 0
    ? `<circle cx="${points[peakIdx].x.toFixed(1)}" cy="${points[peakIdx].y.toFixed(1)}" r="4" class="line-dot"/>
       <text x="${points[peakIdx].x.toFixed(1)}" y="${(points[peakIdx].y - 8).toFixed(1)}" text-anchor="middle" class="line-label" style="fill:var(--accent);font-weight:600">${formatRon(dailyTotals[peakIdx])}</text>`
    : '';

  return `
    <div class="chart-card">
      <div class="chart-title">📅 Trend zilnic</div>
      <div class="chart-subtitle">Cheltuieli pe zile (vârf: ziua ${peakIdx+1})</div>
      <div class="line-chart-wrap">
        <svg class="line-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="area-gradient" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#00d68f" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#00d68f" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${gridLines.join('')}
          <path d="${areaPath}" class="line-area"/>
          <path d="${linePath}" class="line-path"/>
          ${peakDot}
          ${xLabels.join('')}
        </svg>
      </div>
    </div>`;
}

// ── ACCOUNT SPLIT ──
function renderAccountSplit(exps) {
  // Aggregate by account TYPE (cash/card/tichete) to get a clean overview
  const byType = { cash:0, card:0, tichete:0 };
  exps.forEach(e => {
    const acc = getAccount(e.accountId || ('acc-' + (e.method || 'cash')));
    const t = acc.type || 'cash';
    byType[t] = (byType[t] || 0) + e.amount;
  });
  const total = byType.cash + byType.card + byType.tichete;
  if (total === 0) return '';

  const items = [
    { type:'cash',    label:'💵 Cash',         amt: byType.cash,    color:'var(--accent)' },
    { type:'card',    label:'💳 Card',         amt: byType.card,    color:'var(--card-color)' },
    { type:'tichete', label:'🎟️ Tichete Masă', amt: byType.tichete, color:'var(--tichete)' },
  ].filter(i => i.amt > 0);

  // Stacked horizontal bar
  const segments = items.map(i => {
    const pct = (i.amt / total * 100);
    return `<div style="background:${i.color};width:${pct}%;height:100%" title="${i.label}: ${formatRon(i.amt)}"></div>`;
  }).join('');

  const rows = items.map(i => {
    const pct = (i.amt / total * 100).toFixed(1);
    return `
      <div class="legend-item">
        <div class="legend-dot" style="background:${i.color}"></div>
        <div class="legend-label">${i.label}</div>
        <div class="legend-value">${formatRon(i.amt)}</div>
        <div class="legend-pct">${pct}%</div>
      </div>`;
  }).join('');

  return `
    <div class="chart-card">
      <div class="chart-title">🏦 Pe metodă de plată</div>
      <div class="chart-subtitle">Cash vs Card vs Tichete</div>
      <div style="height:18px;background:var(--surface2);border-radius:99px;overflow:hidden;display:flex;margin-bottom:14px">${segments}</div>
      <div class="legend">${rows}</div>
    </div>`;
}

// ── MONTHLY TREND (last 6 months) ──
function renderMonthlyTrend() {
  const months = [];
  for (let i = 5; i >= 0; i--) {
    months.push(shiftMonth(selectedMonth, -i));
  }
  const monthTotals = months.map(m => {
    const total = (appData.expenses||[]).filter(e => monthKey(e.date) === m).reduce((s,e)=>s+e.amount, 0);
    return { month: m, total };
  });
  const maxTotal = Math.max(...monthTotals.map(m=>m.total), 1);
  const sumOfPast5 = monthTotals.slice(0,5).reduce((s,m)=>s+m.total, 0);
  const avgPast5 = sumOfPast5 / 5;
  const currentTotal = monthTotals[5].total;
  const diff = currentTotal - avgPast5;
  const diffPct = avgPast5 > 0 ? (diff / avgPast5 * 100) : 0;

  const monthLabels = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Noi','Dec'];
  const cols = monthTotals.map((m, i) => {
    const isCurrent = m.month === selectedMonth;
    const heightPct = m.total > 0 ? (m.total / maxTotal * 100) : 0;
    const [y, mon] = m.month.split('-');
    const lbl = monthLabels[parseInt(mon)-1];
    const yShort = y.slice(2);
    return `
      <div class="trend-col">
        <div class="trend-amount">${m.total > 0 ? formatRon(m.total).split(',')[0] : ''}</div>
        <div class="trend-bar ${isCurrent?'current':''} ${m.total === 0 ? 'empty' : ''}" style="height:${Math.max(heightPct, m.total === 0 ? 0 : 2)}%"></div>
        <div class="trend-month ${isCurrent?'current':''}">${lbl}'${yShort}</div>
      </div>`;
  }).join('');

  let comparison = '';
  if (avgPast5 > 0) {
    const isOver = diff > 0;
    comparison = `
      <div style="text-align:center;font-size:12px;color:var(--text2);margin-top:6px;padding-top:12px;border-top:1px solid var(--border)">
        ${isOver
          ? `Cu <strong style="color:var(--danger)">${formatRon(Math.abs(diff))} lei (${Math.abs(diffPct).toFixed(0)}%) mai mult</strong>`
          : `Cu <strong style="color:var(--accent)">${formatRon(Math.abs(diff))} lei (${Math.abs(diffPct).toFixed(0)}%) mai puțin</strong>`}
        decât media ultimelor 5 luni
      </div>`;
  }

  return `
    <div class="chart-card">
      <div class="chart-title">📆 Ultimele 6 luni</div>
      <div class="chart-subtitle">Trend pe termen mediu (portocaliu = luna curentă)</div>
      <div class="trend-chart">${cols}</div>
      ${comparison}
    </div>`;
}

function changeMonth(dir) { selectedMonth=shiftMonth(selectedMonth,dir); renderView(); }
function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

let toastTmr;
function showToast(msg,type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTmr);
  toastTmr = setTimeout(()=>{ t.className='toast'; }, 2800);
}
